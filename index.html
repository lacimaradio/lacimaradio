    <!-- SCRIPT PARA EL RELOJ DINÁMICO -->
    <script>
        function actualizarReloj() {
            const ahora = new Date();
            let horas = ahora.getHours().toString().padStart(2, '0');
            let minutes = ahora.getMinutes().toString().padStart(2, '0');
            let segundos = ahora.getSeconds().toString().padStart(2, '0');
            document.getElementById('reloj-digital').innerText = `${horas}:${minutes}:${segundos}`;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
    </script>
